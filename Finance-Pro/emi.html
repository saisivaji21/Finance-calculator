<!DOCTYPE html>
<html>
<head>
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>🏠 EMI Calculator</h1>

<a href="index.html">⬅ Back to Home</a>

<div class="calculator">

    <input type="number" id="loanAmount"
    placeholder="Loan Amount">

    <input type="number" id="interestRate"
    placeholder="Annual Interest Rate (%)">

    <input type="number" id="tenure"
    placeholder="Loan Tenure (Years)">

    <button onclick="calculateEMI()">
        Calculate EMI
    </button>

    <div class="result-box">
        <h2 id="emiResult">Monthly EMI: ₹0</h2>
        <h3 id="interestResult">Interest: ₹0</h3>
        <h3 id="paymentResult">Total Payment: ₹0</h3>
    </div>

</div>

<script>
function calculateEMI(){

    let P = Number(document.getElementById("loanAmount").value);

    let annualRate =
    Number(document.getElementById("interestRate").value);

    let years =
    Number(document.getElementById("tenure").value);

    let R = annualRate/12/100;

    let N = years*12;

    let EMI =
    (P*R*Math.pow(1+R,N))/
    (Math.pow(1+R,N)-1);

    let totalPayment = EMI*N;

    let totalInterest =
    totalPayment-P;

    document.getElementById("emiResult").innerHTML =
    "Monthly EMI: ₹"+EMI.toFixed(2);

    document.getElementById("interestResult").innerHTML =
    "Interest: ₹"+totalInterest.toFixed(2);

    document.getElementById("paymentResult").innerHTML =
    "Total Payment: ₹"+totalPayment.toFixed(2);
}
</script>

</body>
</html>
